# ============================================================================
# .github/workflows/resume_agent_scheduler.yml
# ============================================================================
# AI Resume Agent — Enterprise Scheduled & On-Demand Workflow
# -----------------------------------------------------------
# Runs on free GitHub Actions servers with 45-minute execution limit,
# full Python environment, native PDF generation, zero cloud timeouts,
# and live streaming to Google Sheets.
# ============================================================================

name: 🤖 AI Resume Agent — Daily Job Search & Auto-Sync

on:
  schedule:
    - cron: "0 9 * * 1-5"   # 9:00 AM UTC, Mon-Fri

  workflow_dispatch:
    inputs:
      search_keywords:
        description: "Comma-separated job keywords (overrides default)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: resume-agent-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-resume-agent:
    name: Search, Screen & Compile Resumes
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 Run AI Resume Agent
        run: |
          echo "Starting AI Resume Agent pipeline..."
          python core_orchestrator.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SHEETS_WEBHOOK_URL: ${{ secrets.GOOGLE_SHEETS_WEBHOOK_URL }}
          SEARCH_KEYWORDS: ${{ github.event.inputs.search_keywords || 'Full Stack Web Developer,Junior Web Developer,MERN Stack Web Developer,Frontend Web Developer,React Developer,JavaScript Web Developer' }}
          SEARCH_LOCATION: 'Remote'
          OUTPUT_DIR: "./output"

      - name: 💾 Commit & Push State Changes
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add processed_jobs.json job_tracker.xlsx output/ || true
          git diff --staged --quiet || git commit -m "chore: auto-update agent state [skip ci]"
          git push || true
